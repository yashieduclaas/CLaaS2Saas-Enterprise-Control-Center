name: PR Validation

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required files
        run: |
          test -f ARCHITECTURE.md
          test -f CONTRIBUTING.md
          test -f CODING_STANDARDS.md
          test -f SECURITY.md
          test -f API_REFERENCE.md
          test -f DEVELOPMENT_SETUP.md
          test -f CHANGELOG.md
          test -f .env.example
